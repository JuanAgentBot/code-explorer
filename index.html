<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>code-explorer</title>
    <link rel="stylesheet" href="/src/shared/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1><span style="color: var(--accent)">&gt;</span> code-explorer</h1>
      </div>
      <div id="tab-bar" class="tab-bar"></div>
      <div class="editor-panel">
        <div class="panel">
          <div class="panel-header">
            <span class="dot"></span> <span id="input-label">input.ts</span>
          </div>
          <div class="panel-body">
            <div id="code-input" class="code-input"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="dot" id="diagram-dot" style="background: var(--accent)"></span> diagram
          </div>
          <div class="panel-body">
            <div id="diagram-output" class="diagram-area">
              <div class="empty-state">Paste some TypeScript to see the diagram</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/typescript@5.8.3/lib/typescript.min.js"></script>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
