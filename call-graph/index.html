<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Graph - code-explorer</title>
    <link rel="stylesheet" href="../src/shared/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1><a href="../" style="color: var(--text-dim)">&gt;</a> Call Graph</h1>
        <span class="tag">prototype</span>
        <nav>
          <a href="../type-map/">Type Map</a>
          <a href="../module-graph/">Module Graph</a>
        </nav>
      </div>
      <div class="editor-panel">
        <div class="panel">
          <div class="panel-header">
            <span class="dot"></span> input.ts
          </div>
          <div class="panel-body">
            <textarea
              id="code-input"
              class="code-input"
              spellcheck="false"
              placeholder="Paste TypeScript code with functions, methods, or arrow functions..."
            ></textarea>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <span class="dot" style="background: var(--orange)"></span> diagram
          </div>
          <div class="panel-body">
            <div id="diagram-output" class="diagram-area">
              <div class="empty-state">Paste some TypeScript to see the call graph</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/typescript@5.8.3/lib/typescript.min.js"></script>
    <script type="module" src="../src/call-graph.ts"></script>
  </body>
</html>
